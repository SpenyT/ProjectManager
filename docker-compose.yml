services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-projectmanager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-projectmanager}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-projectmanager} -d ${DB_NAME:-projectmanager}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-projectmanager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: projectmanager_test
    ports:
      - "${DB_TEST_PORT:-5433}:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-projectmanager} -d projectmanager_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
  pgdata_test:
